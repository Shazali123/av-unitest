services:
  - type: web
    name: av-unitest
    runtime: python
    rootDir: ./
    buildCommand: pip install -r requirements.server.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: AV_UNITEST_API_KEY
        generateValue: true
      - key: LATEST_VERSION
        value: "1.0.0"
      - key: DOWNLOAD_URL
        value: "https://github.com/Shazali123/av-unitest/releases/latest"
      - key: DATABASE_URL
        fromDatabase:
          name: av-unitest-db
          property: connectionString

databases:
  - name: av-unitest-db
    plan: free
